# Assistant - A helpful AI assistant
# Demonstrates Octavus features in a natural, intuitive way

# Session input (optional)
input:
  USER_NAME:
    type: string
    description: User's display name
    optional: true
    default: ""

# Internal variables
variables:
  CONVERSATION_TEXT:
    type: string
  GENERATED_SUMMARY:
    type: string
  GENERATED_TITLE:
    type: string
  IMAGE_PROMPT:
    type: string
  GENERATED_IMAGE_URL:
    type: string
  METADATA_SAVED:
    type: unknown

# Triggers
triggers:
  user-message:
    description: User sends a message
    input:
      USER_MESSAGE:
        type: string
      ATTACHMENTS:
        type: file[]
        optional: true

  generate-metadata:
    description: Generate title, summary, and cover image for the chat

# External tools - implemented by consumer (server or client)
tools:
  get-current-time:
    description: Getting the current time
    display: description
    parameters:
      timezone:
        type: string
        description: Timezone (e.g., "America/New_York", "UTC")
        optional: true

  # Client-side tools (no server handler - forwarded to client)
  get-browser-info:
    description: Get browser information from the user's device
    display: description

  request-feedback:
    description: Request feedback from the user via an interactive modal
    display: description
    parameters:
      promptText:
        type: string
        description: Custom prompt text to display
        optional: true
      showRating:
        type: boolean
        description: Whether to show star rating (default true)
        optional: true
      showComment:
        type: boolean
        description: Whether to show comment input (default true)
        optional: true

  # Client-side tool: with no server handler registered, its calls are forwarded
  # to the browser, which updates the chat sidebar.
  set-chat-metadata:
    description: Save the generated chat title, summary, and cover image to the UI
    parameters:
      title:
        type: string
      summary:
        type: string
      image:
        type: string

# Octavus skill - code execution
skills:
  qr-code:
    display: description
    description: Generating QR code

# Agent configuration
agent:
  model: anthropic/claude-sonnet-4-5
  system: system
  input:
    - USER_NAME
  tools:
    - get-current-time
    - get-browser-info
    - request-feedback
  skills:
    - qr-code
  agentic: true
  maxSteps: 10
  thinking: medium
  imageModel: openai/gpt-image-1

# Handlers
handlers:
  # Primary chat - simple and natural
  user-message:
    Add user message:
      block: add-message
      role: user
      prompt: user-message
      input:
        - USER_MESSAGE
      files:
        - ATTACHMENTS
      uiContent: USER_MESSAGE
      display: hidden

    Respond:
      block: next-message

  # Generate metadata - demonstrates threads, client tools, and image generation
  generate-metadata:
    Serialize conversation:
      block: serialize-thread
      format: markdown
      output: CONVERSATION_TEXT

    Start metadata thread:
      block: start-thread
      thread: metadata-generator
      model: anthropic/claude-sonnet-4-5
      system: metadata-system
      input:
        - CONVERSATION: CONVERSATION_TEXT

    # Generate summary
    Add summary request:
      block: add-message
      thread: metadata-generator
      role: user
      prompt: summary-request

    Generate summary:
      block: next-message
      thread: metadata-generator
      description: Generating summary
      display: stream
      independent: true
      output: GENERATED_SUMMARY

    # Generate title
    Add title request:
      block: add-message
      thread: metadata-generator
      role: user
      prompt: title-request
      input:
        - SUMMARY: GENERATED_SUMMARY

    Generate title:
      block: next-message
      thread: metadata-generator
      description: Generating title
      display: stream
      independent: true
      output: GENERATED_TITLE

    # Generate image prompt
    Add image prompt request:
      block: add-message
      thread: metadata-generator
      role: user
      prompt: image-prompt-request
      input:
        - SUMMARY: GENERATED_SUMMARY

    Generate image prompt:
      block: next-message
      thread: metadata-generator
      description: Creating image prompt
      display: stream
      independent: true
      output: IMAGE_PROMPT

    # Generate cover image
    Generate cover image:
      block: generate-image
      prompt: IMAGE_PROMPT
      imageModel: openai/gpt-image-1
      size: 1024x1024
      output: GENERATED_IMAGE_URL
      description: Generating cover image

    # Save all generated metadata to the UI via a client tool
    Save metadata:
      block: tool-call
      tool: set-chat-metadata
      input:
        title: GENERATED_TITLE
        summary: GENERATED_SUMMARY
        image: GENERATED_IMAGE_URL
      output: METADATA_SAVED
      display: hidden
